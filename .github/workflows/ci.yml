name: CI

on:
  push:
  pull_request:

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build
      - name: Run starter executable
        run: ./build/$(basename "$PWD" | tr '-' '_')
      - name: Smoke tests
        run: python -m unittest discover -s tests
