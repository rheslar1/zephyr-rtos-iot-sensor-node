name: CI

on:
  push:
  pull_request:

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build
      - name: Run sensor-node executable
        run: ./build/zephyr_rtos_iot_sensor_node
      - name: CTest
        run: ctest --test-dir build --output-on-failure
